<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面不存在 | 留学澳洲 StudyAustralia</title>
  <meta name="robots" content="noindex">
  <style>
    /* 自包含：404 可能在任意路径触发，不依赖外部 CSS */
    :root { --ink:#131c2b; --body:#45536a; --accent:#2455c4; --paper:#fafbfd; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
      background:var(--paper); color:var(--ink);
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    }
    .box { text-align:center; max-width:460px; }
    .code { font-size:5rem; font-weight:700; letter-spacing:-0.03em; color:var(--accent); line-height:1; }
    h1 { font-size:1.4rem; margin:18px 0 10px; }
    p { color:var(--body); line-height:1.7; margin-bottom:28px; }
    a {
      display:inline-flex; align-items:center; gap:8px; padding:13px 28px; border-radius:999px;
      background:var(--accent); color:#fff; text-decoration:none; font-weight:600;
      transition:background .25s;
    }
    a:hover { background:#1b3f96; }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>这个页面不存在</h1>
    <p>你要找的页面可能已移动或从未存在。回到首页继续了解澳洲留学与签证服务。</p>
    <a href="/">返回首页</a>
  </div>
</body>
</html>
